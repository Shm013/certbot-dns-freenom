language: python

services:
  - docker

stages:
  - test
  - build_docker
  - name: deploy
    if: branch = master

jobs:
  include:
    - install:
      - pip install --upgrade pip
      - pip install .
      - pip install setuptools wheel pylint
      script: pylint certbot_dns_freenom
    - stage: build_docker
      script:
        - bash build.sh '1.3.0' '1.3.3'
        - docker images ls
    - stage: deploy
      script: skip
      deploy:
        - provider: pypi
          user: "__token__"
          password: "$SECRET_TOKEN"
